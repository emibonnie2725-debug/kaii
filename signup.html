<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <title>Sign Up — KLINNIUM STUDIO</title>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-mark">K</div>
      <h1>Create Account</h1>
      <p>Join the portfolio dashboard</p>
    </div>

    <div class="auth-body">
      <form id="signupForm" onsubmit="handleSignup(event)">

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" required />
          <div class="error-message" id="usernameError"></div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="your@email.com" required />
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-toggle">
            <input type="password" id="password" placeholder="Create a password" required />
            <button type="button" class="toggle-btn" onclick="togglePassword('password', this)">
              <i class='bx bx-hide'></i>
            </button>
          </div>
          <div class="error-message" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-toggle">
            <input type="password" id="confirmPassword" placeholder="Repeat your password" required />
            <button type="button" class="toggle-btn" onclick="togglePassword('confirmPassword', this)">
              <i class='bx bx-hide'></i>
            </button>
          </div>
          <div class="error-message" id="confirmError"></div>
        </div>

        <button type="submit" class="login-btn">Create Account ✦</button>
      </form>
    </div>

    <div class="auth-footer">
      <p>Already have an account? <a href="login.html">Sign in here</a></p>
    </div>
  </div>

  <script>
    function handleSignup(e) {
      e.preventDefault();
      ['usernameError','emailError','passwordError','confirmError'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });

      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const confirm  = document.getElementById('confirmPassword').value.trim();

      if (!username)           { showErr('usernameError', 'Username is required'); return; }
      if (!email)              { showErr('emailError', 'Email is required'); return; }
      if (password.length < 6) { showErr('passwordError', 'Password must be at least 6 characters'); return; }
      if (password !== confirm) { showErr('confirmError', 'Passwords do not match'); return; }

      const users = JSON.parse(localStorage.getItem('users') || '[]');
      if (users.find(u => u.Username === username)) {
        showErr('usernameError', 'Username already taken'); return;
      }

      users.push({ Username: username, Password: password, Email: email });
      localStorage.setItem('users', JSON.stringify(users));
      alert('Account created! You can now sign in ✦');
      window.location.href = 'login.html';
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }

    function togglePassword(fieldId, btn) {
      const field = document.getElementById(fieldId);
      const icon  = btn.querySelector('i');
      if (field.type === 'password') {
        field.type = 'text';
        icon.classList.replace('bx-hide', 'bx-show');
      } else {
        field.type = 'password';
        icon.classList.replace('bx-show', 'bx-hide');
      }
    }
  </script>
</body>
</html>
